name: Lock Daily Signals
on:
  schedule:
    - cron: "00 03 * * *"
  workflow_dispatch:
jobs:
  lock-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pytz pyarrow
      - name: Lock today signals
        run: python scripts/lock_signals.py
        env:
          BACKEND_URL: https://strikes-and-downs.onrender.com
          FORCE_LOCK: "1"
          SAD_TOKEN: ${{ secrets.SAD_TOKEN }}
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add -A
          git diff --cached --quiet || git commit -m "Lock signals $(date +%Y-%m-%d)"
          git push origin main
